# Development profile - uses H2 in-memory database (no Docker needed)
spring:
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

app:
  cors:
    allowed-origins: http://localhost:5173


# JWT Configuration
jwt:
  secret: devSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm12345678
  expiration: 86400000
